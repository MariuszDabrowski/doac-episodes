<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>DOAC episodes</title>
    <meta name="description" content="A discovery tool for The Diary of a CEO podcast." />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />

    <!-- Open Graph + Twitter card metadata. Absolute URLs are required
         for most crawlers (LinkedIn, Twitter/X, Slack, Discord). Image
         lives at public/og.jpg (kept as JPEG to stay under WhatsApp's
         600KB cap; PNG is overkill for a photo). -->
    <meta property="og:title" content="DOAC episodes" />
    <meta
      property="og:description"
      content="Every Diary of a CEO episode, organized. Editorial titles, short summaries, and topic filters to help you find the conversations worth your time."
    />
    <meta property="og:image" content="https://mariuszdabrowski.github.io/doac-episodes/og.jpg" />
    <meta property="og:image:type" content="image/jpeg" />
    <meta property="og:image:width" content="1200" />
    <meta property="og:image:height" content="630" />
    <meta property="og:url" content="https://mariuszdabrowski.github.io/doac-episodes/" />
    <meta property="og:type" content="website" />
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="DOAC episodes" />
    <meta
      name="twitter:description"
      content="Every Diary of a CEO episode, organized."
    />
    <meta name="twitter:image" content="https://mariuszdabrowski.github.io/doac-episodes/og.jpg" />
    <!-- Disable the browser's scroll-restoration *before* the browser
         starts restoring for this navigation. Setting this later (e.g.
         inside the deferred module script in main.js) is too late: the
         flag only governs future navigations, not the current one. -->
    <script>
      if ('scrollRestoration' in history) history.scrollRestoration = 'manual';
    </script>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Barlow:wght@400;500;600;700&family=Barlow+Semi+Condensed:wght@400;500;600;700&family=Caveat:wght@500&display=swap"
    />
  </head>
  <body>
    <div id="app"></div>
    <script type="module" src="/src/main.js"></script>
  </body>
</html>
